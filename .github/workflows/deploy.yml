name: Deploy BMI-Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          timeout:  300s
          script: |
            set -euo pipefail

            echo "=== [$(date)] BMI-Server Deploy Started ==="

            # ── Pull latest code ───────────────────────────────────────
            cd /var/www/bmi-server
            git fetch --all --prune
            git reset --hard origin/main 2>/dev/null || git reset --hard origin/master

            # ── Install production dependencies ────────────────────────
            npm ci --omit=dev --prefer-offline

            # ── Zero-downtime reload via PM2 cluster ───────────────────
            pm2 reload bmi-server --update-env
            pm2 save

            # ── Verify process is running ──────────────────────────────
            sleep 3
            pm2 describe bmi-server | grep -E 'status|restarts'

            echo "=== [$(date)] BMI-Server Deploy Succeeded ==="

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::BMI-Server deploy failed. Check VPS logs: pm2 logs bmi-server"
